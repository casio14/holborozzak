name: Deploy to Rackhost

# main-re pusholáskor: kiszámolja a következő szemantikus verziót, generál egy
# version.php-t, FTP-vel deployol, majd SIKER esetén létrehoz egy vX.Y.Z git taget.
#
# ROLLBACK / adott verzió újradeployolása:
#   GitHub → Actions → "Deploy to Rackhost" → "Run workflow" gomb, és a
#   "Use workflow from" legördülőből válaszd a kívánt tag-et (pl. v1.0.3).
#   Ilyenkor a workflow ÚJ taget nem hoz létre, csak újra kiteszi azt a verziót.

on:
  push:
    branches: [main]
  workflow_dispatch:

# A git tag pusholásához írási jog kell a repóra
permissions:
  contents: write

# Egyszerre csak egy deploy fusson
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése (teljes history + tagek)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # kellenek a tagek a verziószámításhoz

      - name: Verzió meghatározása
        id: ver
        run: |
          set -euo pipefail
          MM=$(tr -d ' \r\n' < VERSION)   # major.minor, pl. "1.0"

          IS_TAG=false
          case "${{ github.ref_name }}" in v*) IS_TAG=true ;; esac

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$IS_TAG" = "true" ]; then
            # Rollback: meglévő tagről futtatva — nem hozunk létre új taget
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            CREATE_TAG=false
            echo "Rollback futás: v$VERSION újradeployolása"
          else
            # Normál push main-re: a patch a meglévő tagek alapján +1
            LAST=$(git tag -l "v${MM}.*" | sed "s#^v${MM}\.##" | sort -n | tail -1 || true)
            if [ -z "${LAST:-}" ]; then NEXT=0; else NEXT=$((LAST + 1)); fi
            VERSION="${MM}.${NEXT}"
            CREATE_TAG=true
            echo "Új verzió: v$VERSION"
          fi

          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "create_tag=$CREATE_TAG" >> "$GITHUB_OUTPUT"

      - name: version.php generálása
        run: |
          set -euo pipefail
          printf '<?php\n$APP_VERSION = %s;\n$APP_BUILD_DATE = %s;\n' \
            "'${{ steps.ver.outputs.version }}'" \
            "'$(date -u +%Y-%m-%d)'" \
            > public/version.php
          echo "--- public/version.php ---"
          cat public/version.php

      - name: config.php generálása (DB + admin a secretekből)
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_SALT: ${{ secrets.APP_SALT }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COLLECT_TOKEN: ${{ secrets.COLLECT_TOKEN }}
          NEWSLETTER_TOKEN: ${{ secrets.NEWSLETTER_TOKEN }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          set -euo pipefail
          umask 077
          # PHP single-quote escape segéd: \ -> \\ , ' -> \'
          esc() { local s=${1//\\/\\\\}; printf '%s' "${s//\'/\\\'}"; }

          ESC=$(esc "$DB_PASSWORD")
          # APP_SALT: ha nincs beállítva, a DB_PASSWORD-ből származtatunk egy stabil sót
          SALT_SRC=${APP_SALT:-$DB_PASSWORD}
          SALT=$(printf '%s' "holborozzak|$SALT_SRC" | sha256sum | cut -d' ' -f1)

          # Admin: felhasználónév + a jelszó bcrypt hash-e (a runner php-jével)
          AUSER=$(esc "${ADMIN_USER:-admin}")
          if [ -n "${ADMIN_PASSWORD:-}" ] && command -v php >/dev/null 2>&1; then
            AHASH=$(P="$ADMIN_PASSWORD" php -r 'echo password_hash(getenv("P"), PASSWORD_DEFAULT);')
          else
            AHASH=""
            echo "FIGYELEM: ADMIN_PASSWORD nincs beállítva (vagy nincs php) — admin belépés letiltva."
          fi
          AHASH=$(esc "$AHASH")
          AKEY=$(esc "${ANTHROPIC_API_KEY:-}")
          CTOK=$(esc "${COLLECT_TOKEN:-}")
          NTOK=$(esc "${NEWSLETTER_TOKEN:-}")
          MFROM=$(esc "${MAIL_FROM:-}")

          {
            echo '<?php'
            echo '// Generálva a CI által — NE kerüljön gitbe. Titkok: DB_PASSWORD, APP_SALT, ADMIN_*.'
            echo 'return ['
            echo "    'db' => ["
            echo "        'host' => 'mysql.rackhost.hu',"
            echo "        'port' => 3306,"
            echo "        'name' => 'c105746holborozzak',"
            echo "        'user' => 'c105746patrik',"
            printf "        'pass' => '%s',\n" "$ESC"
            echo '    ],'
            printf "    'app_salt' => '%s',\n" "$SALT"
            echo "    'admin' => ["
            printf "        'user' => '%s',\n" "$AUSER"
            printf "        'pass_hash' => '%s',\n" "$AHASH"
            echo '    ],'
            echo "    'anthropic' => ["
            printf "        'api_key' => '%s',\n" "$AKEY"
            echo "        'model' => 'claude-haiku-4-5',"
            echo '    ],'
            printf "    'collect_token' => '%s',\n" "$CTOK"
            printf "    'newsletter_token' => '%s',\n" "$NTOK"
            echo "    'mail' => ["
            printf "        'from_email' => '%s',\n" "$MFROM"
            echo "        'from_name' => 'holborozzak.hu',"
            echo '    ],'
            echo '];'
          } > public/config.php
          # NEM írjuk ki a tartalmat (jelszó!), csak a méretet:
          echo "config.php kész ($(wc -c < public/config.php) bájt)"

      - name: Feltöltés FTP-n a Rackhostra
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: wh28.rackhost.hu
          username: c105746ptrk
          password: ${{ secrets.FTP_PASSWORD }}
          # A Rackhost FTP szervere nem támogatja az FTPS-t (AUTH TLS -> 500),
          # ezért sima FTP. TODO: SFTP/SSH-ra váltani, ha elérhető (titkosítás).
          protocol: ftp
          # A holborozzak.hu document rootja: a public/ tartalma ide kerül,
          # így a szép URL-ek, a robots.txt és a sitemap a domain gyökeréből szolgálódnak.
          local-dir: ./public/
          server-dir: /web/holborozzak.hu/
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/node_modules/**
            **/config.example.php

      - name: Git tag létrehozása és push (csak sikeres deploy után)
        if: steps.ver.outputs.create_tag == 'true'
        run: |
          set -euo pipefail
          V="v${{ steps.ver.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$V" -m "Release $V"
          git push origin "$V"
          echo "Létrehozott tag: $V"
