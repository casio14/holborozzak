name: Esemény-gyűjtés (napi)

# 3 naponta lefut: a Claude web search-csel közelgő magyar borrendezvényeket
# keres az interneten, és az újakat jelöltként beszúrja az event_candidates táblába.
# A jóváhagyás az adminban kézzel történik (NEM publikál automatikusan).
#
# Kézi indítás: Actions → "Esemény-gyűjtés (napi)" → Run workflow.

on:
  schedule:
    - cron: '0 25 */3 * *'   # 3 naponta, 05:00 UTC (~07:00 CEST)
  workflow_dispatch:

# Egyszerre csak egy gyűjtés fusson
concurrency:
  group: collect-events
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: PHP beállítása
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl

      - name: Gyűjtő futtatása
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Keresés+szintézis: Sonnet 4.6 dinamikus szűrésű web search-csel (token-takarékos, megbízhatóbb)
          ANTHROPIC_MODEL: claude-sonnet-4-6
          # A weboldal token-védett fogadó végpontja (a DB-írás ott történik).
          COLLECT_URL: https://holborozzak.hu/collect-ingest.php
          COLLECT_TOKEN: ${{ secrets.COLLECT_TOKEN }}
        run: php scripts/collect_events.php
