name: Forrás-import (heti)

# Hetente lefut: egy kurált listányi konkrét programoldalt (borvacsora- és
# kóstoló-helyszínek, bornaptárak) olvas be, és mindegyikből kinyeri a közelgő
# eseményeket, majd jelöltként beszúrja az event_candidates táblába.
# A jóváhagyás az adminban kézzel történik (NEM publikál automatikusan).
#
# Kézi indítás: Actions → "Forrás-import (heti)" → Run workflow.

on:
  schedule:
    - cron: '0 6 * * 1'   # hétfőnként 06:00 UTC (~08:00 CEST)
  workflow_dispatch:

# Egyszerre csak egy import fusson
concurrency:
  group: import-sources
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: PHP beállítása
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl

      - name: Import futtatása
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Szöveg-kinyerés (nincs web search): Haiku elég és olcsó.
          ANTHROPIC_MODEL: claude-haiku-4-5
          # A weboldal token-védett fogadó végpontja (a DB-írás ott történik).
          COLLECT_URL: https://holborozzak.hu/collect-ingest.php
          COLLECT_TOKEN: ${{ secrets.COLLECT_TOKEN }}
        run: php scripts/import_sources.php
