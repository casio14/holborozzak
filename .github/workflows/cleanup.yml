name: Szerver-takarítás (árvafájlok)

# Egyszeri, KÉZI indítású takarítás: az első hibás deploy árvafájljait törli.
# Az FTP-login a kissptrk.hu docrootjába érkezik; az árva fa ott a relatív
# `web/` könyvtár (a szerveren: /web/kissptrk.hu/web/kissptrk.hu/borozzak/).
# Az élő oldal a `borozzak/` alatt van — ahhoz NEM nyúlunk.
#
# Python ftplib-bel megy (nem lftp-vel): a jelszó env-változóként adódik át,
# így nincs shell-idézőjelezési / -u parse-olási probléma, és minden lépés
# beszédesen naplózódik.

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Árva web/ könyvtár listázása és törlése
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os, sys
          from ftplib import FTP, error_perm

          HOST, USER = 'wh11.rackhost.hu', 'c105746ptrk'
          TARGET = 'web'   # az árva fa gyökere az FTP-gyökérből nézve

          ftp = FTP(HOST, timeout=60)
          print('Kapcsolodva:', ftp.getwelcome())
          ftp.login(USER, os.environ['FTP_PASSWORD'])
          print('Belepve.')

          def names_in(path):
              try:
                  return [n.rsplit('/', 1)[-1] for n in ftp.nlst(path)
                          if n.rsplit('/', 1)[-1] not in ('.', '..')]
              except error_perm:
                  return []   # ures konyvtar (egyes szerverek 550-et adnak ra)

          def is_dir(path):
              cur = ftp.pwd()
              try:
                  ftp.cwd(path)
                  ftp.cwd(cur)
                  return True
              except error_perm:
                  return False

          def rmtree(path):
              if not is_dir(path):
                  print('  fajl torlese:   ', path)
                  ftp.delete(path)
                  return
              for base in names_in(path):
                  rmtree(path + '/' + base)
              print('  konyvtar torlese:', path)
              ftp.rmd(path)

          print('--- FTP-gyoker ELOTTE ---')
          ftp.retrlines('LIST')

          root = names_in('')
          if TARGET not in root:
              print(f"Nincs '{TARGET}/' konyvtar az FTP-gyokerben — nincs teendo.")
          else:
              print(f"--- '{TARGET}/' fa torlese ---")
              rmtree(TARGET)

          print('--- FTP-gyoker UTANA ---')
          ftp.retrlines('LIST')
          ftp.quit()
          print('Kesz.')
          PY
